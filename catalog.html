<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timzy Fashion Catalog</title>
  <link rel="stylesheet" href="catalog.css?v=v3_luxury_mobile" />
</head>
<body>
  <header class="shop-header">
    <a class="shop-brand" href="index.html" aria-label="Timzy Fashion Home">
      <span class="shop-logo-slot"><img src="assets/timzy-logo.png" alt="Timzy Fashion Logo" /></span>
    </a>
    <button id="wishlistHeaderBtn" class="icon-btn" onclick="toggleWishlistPanel()" aria-label="Wishlist">♡</button>
  </header>

  <main>
    <section class="shop-hero">
      <p>Timzy Fashion</p>
      <h1>Shop the Collection</h1>
      <span>Simple, premium browsing. Tap any item to view more photos, zoom details and order.</span>
    </section>

    <section class="search-card">
      <input id="searchInput" type="search" placeholder="Search styles, fabrics, colors..." oninput="filterProducts()" />
      <div class="filter-row">
        <select id="categoryFilter" onchange="filterProducts()">
          <option value="">All Categories</option>
          <option>Senator</option><option>Agbada</option><option>Kaftan</option><option>Female Wear</option><option>Ready-to-Wear</option><option>Adire</option><option>Aso Oke</option><option>Children</option><option>Fabrics</option><option>Accessories</option><option>Bags</option><option>Shoes</option>
        </select>
        <select id="typeFilter" onchange="filterProducts()">
          <option value="">All Types</option>
          <option>Ready-Made</option><option>Fabric / Material</option><option>Custom Sewing</option><option>Accessory</option>
        </select>
      </div>
    </section>

    <section class="quick-cats" id="collections">
      <button onclick="quickCategory('Senator')"><span>Senator</span></button>
      <button onclick="quickCategory('Agbada')"><span>Agbada</span></button>
      <button onclick="quickCategory('Kaftan')"><span>Kaftan</span></button>
      <button onclick="quickCategory('Fabrics')"><span>Fabrics</span></button>
      <button onclick="quickCategory('Accessories')"><span>Accessories</span></button>
    </section>

    <section id="bestSellers" class="catalog-section">
      <div class="section-title"><p>Featured</p><h2>Signature Pieces</h2></div>
      <div id="featuredGrid" class="product-grid featured"></div>
    </section>

    <section id="allProducts" class="catalog-section">
      <div class="section-title"><p>Catalog</p><h2>All Products</h2></div>
      <div id="catalogGrid" class="product-grid"></div>
    </section>

    <section id="recentlyViewedSection" class="catalog-section" style="display:none;">
      <div class="section-title"><p>Recent</p><h2>Recently Viewed</h2></div>
      <div id="recentlyViewedGrid" class="mini-product-row"></div>
    </section>
  </main>

  <aside id="wishlistPanel" class="side-panel" style="display:none;">
    <div class="side-panel-card">
      <button class="close-panel" onclick="toggleWishlistPanel()">×</button>
      <p>Saved Items</p>
      <h2>Your Wishlist</h2>
      <div id="wishlistPanelItems"></div>
    </div>
  </aside>

  <div id="productModal" class="modal" style="display:none;">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <a class="floating-whatsapp" href="https://wa.me/2348118103510" target="_blank">WhatsApp</a>

  <nav class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="#collections">Categories</a>
    <a href="#allProducts">Shop</a>
    <a href="https://wa.me/2348118103510" target="_blank">Order</a>
  </nav>

  <script type="module" src="catalog.js?v=v3_luxury_mobile"></script>
</body>
</html>
