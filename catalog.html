<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Catalog · Timzy Fashion</title><link rel="stylesheet" href="lean.css"></head><body>
<div class="wrap"><header class="nav"><a href="index.html"><img class="logo" src="assets/timzy-logo.png" alt="Timzy Fashion"></a><a class="btn-ghost" href="index.html">Home</a></header>
<section class="section-head"><div><p class="kicker">Timzy Collection</p><h2>Product Catalog</h2><p class="muted">Tap any product to view more photos and order on WhatsApp.</p></div></section>
<div id="categoryChips" class="chips"></div><div id="catalogGrid" class="catalog-grid"><div class="empty">Loading products…</div></div></div>
<div id="productModal" class="modal"><button class="close" onclick="closeProduct()">×</button><div class="modal-card"><div><div class="modal-main"><img id="modalImage" alt="Product"></div><div id="modalThumbs" class="thumbs"></div></div><div><p id="modalCategory" class="kicker"></p><h2 id="modalName" style="font-family:Georgia,serif;color:var(--gold);margin:.2em 0"></h2><p id="modalPrice" class="price" style="font-size:1.3rem"></p><p id="modalDesc" class="muted" style="line-height:1.7"></p><div class="hero-actions"><a id="modalWhatsapp" class="btn" target="_blank">Order on WhatsApp</a><button class="btn-ghost" onclick="prevImg()">← Prev</button><button class="btn-ghost" onclick="nextImg()">Next →</button></div></div></div></div>
<script src="timzy-config.js"></script><script src="lean-public.js"></script></body></html>
